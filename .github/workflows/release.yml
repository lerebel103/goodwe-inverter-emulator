name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-decorate)
          else
            CHANGES=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat <<'BODY_EOF'
          ## Changes
          ${{ steps.changelog.outputs.changes }}

          ## Docker Image
          ```
          docker pull lerebel103/goodwe-et-inverter-emulator:${{ github.ref_name }}
          docker pull lerebel103/goodwe-et-inverter-emulator:latest
          ```
          BODY_EOF
          )
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "$BODY" --generate-notes
